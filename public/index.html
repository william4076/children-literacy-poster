<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童识字小报生成器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🎨 儿童识字小报生成器</h1>

        <div class="form-section">
            <div class="form-group">
                <label for="theme">选择主题：</label>
                <select id="theme" required>
                    <option value="">请选择...</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">小报标题：</label>
                <input type="text" id="title" placeholder="例如：走进超市" required>
            </div>

            <button id="generateBtn" onclick="generatePoster()">生成小报</button>
        </div>

        <div id="status" class="status hidden"></div>

        <div id="result" class="result hidden">
            <h2>生成结果</h2>
            <img id="resultImage" src="" alt="生成的小报">
            <button onclick="downloadImage()">下载图片</button>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>

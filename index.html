<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>儿童识字小报生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
        }

        .form-section {
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: bold;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        textarea {
            min-height: 100px;
            resize: vertical;
        }

        select:focus, input:focus, textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .status {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }

        .status.loading {
            background: #fff3cd;
            color: #856404;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .hidden {
            display: none;
        }

        .result {
            text-align: center;
        }

        .result h2 {
            margin-bottom: 20px;
            color: #333;
        }

        .result img {
            max-width: 100%;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }

        .config-section {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .config-section small {
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎨 儿童识字小报生成器</h1>

        <div class="config-section">
            <div class="form-group">
                <label for="apiKey">API Key：</label>
                <input type="password" id="apiKey" placeholder="请输入你的 Nano Banana Pro API Key">
                <small>从 <a href="https://kie.ai/api-key" target="_blank">https://kie.ai/api-key</a> 获取</small>
            </div>
        </div>

        <div class="form-section">
            <div class="form-group">
                <label for="theme">选择主题：</label>
                <select id="theme" required>
                    <option value="">请选择...</option>
                    <option value="超市">超市</option>
                    <option value="医院">医院</option>
                    <option value="公园">公园</option>
                    <option value="学校">学校</option>
                    <option value="动物园">动物园</option>
                </select>
            </div>

            <div class="form-group">
                <label for="title">小报标题：</label>
                <input type="text" id="title" placeholder="例如：走进超市" required>
            </div>

            <button id="generateBtn" onclick="generatePoster()">生成小报</button>
        </div>

        <div id="status" class="status hidden"></div>

        <div id="result" class="result hidden">
            <h2>生成结果</h2>
            <img id="resultImage" src="" alt="生成的小报">
            <button onclick="downloadImage()">下载图片</button>
        </div>
    </div>

    <script src="vocabulary.js"></script>
    <script src="app.js"></script>
</body>
</html>
